<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPSQI 的个人博客</title>
    <style>
        /* 全局样式重置与基础设定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
        }
        a {
            color: #2c3e50;
            text-decoration: none;
        }
        a:hover {
            color: #18bc9c;
        }

        /* 顶部导航栏 */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .logo a {
            color: white;
        }
        nav ul {
            display: flex;
            list-style: none;
        }
        nav ul li {
            margin-left: 20px;
        }
        nav ul li a {
            color: #ecf0f1;
            font-weight: 500;
        }

        /* 主体布局（左边文章，右边侧边栏） */
        .main-container {
            max-width: 1000px;
            margin: 30px auto;
            display: flex;
            gap: 30px;
            padding: 0 20px;
        }

        /* 文章列表区域 */
        .content-area {
            flex: 3;
        }
        .post-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
        }
        .post-title {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        .post-meta {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .post-excerpt {
            color: #555;
            margin-bottom: 15px;
        }
        .read-more {
            display: inline-block;
            font-weight: bold;
            color: #18bc9c;
        }

        /* 右侧侧边栏 */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .widget {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .widget-title {
            font-size: 1.1rem;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background-color: #bdc3c7;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }
        .profile {
            text-align: center;
        }
        .profile p {
            font-size: 0.9rem;
            color: #666;
        }

        /* 页脚 */
        footer {
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px 0;
            margin-top: 50px;
            font-size: 0.9rem;
        }

        /* 移动端自适应 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                flex: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo"><a href="#">TPSQI's Blog</a></div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="about.html">关于我</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>还没写完</h1>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
        <p>对</p>
        <p>嗯</p>
        
        <a href="index.html" class="back-home">← 返回首页</a>
    </div>

    <footer>
        <p>&copy; 2026 TPSQI. Powered by GitHub Pages.</p>
    </footer>

</body>
</html>
